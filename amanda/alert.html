<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       url("background.jpg");
      --surface:  #fffaf0;
      --text:     #0f172a;
      --text-sub: #475569;
      --accent:   #c2410c;
      --r:        28px;
      --r-sm:     22px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    body { padding: 8px; }

    /* ── Card ── */
    .alert {
      position: relative;
      border-radius: var(--r);
      background: var(--surface);
      box-shadow:
        0 20px 60px rgba(15, 23, 42, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.72);
      animation: card-enter 700ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }
    .alert::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 88% 80%, rgba(251, 191, 36, 0.18), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.78)),
        var(--bg, none);
      background-size: cover;
      background-position: center;
      opacity: 0.95;
      z-index: 0;
    }
    .alert::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: var(--r-sm);
      border: 1px solid rgba(255, 255, 255, 0.72);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Content ── */
    .alert-content {
      position: relative;
      z-index: 3;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    /* ── Avatar ── */
    .avatar-frame {
      flex: 0 0 86px;
      width: 86px; height: 86px;
      padding: 5px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        0 10px 26px rgba(15, 23, 42, 0.13),
        inset 0 0 0 1px rgba(255, 255, 255, 0.9);
      animation: avatar-float 3.5s ease-in-out infinite;
    }
    .avatar-frame:has(.avatar[src=""]),
    .avatar-frame:has(.avatar:not([src])) { display: none; }

    .avatar {
      width: 100%; height: 100%;
      display: block;
      object-fit: cover;
      border-radius: 21px;
      background: #e5e7eb;
    }
    .avatar[src=""], .avatar:not([src]) { display: none; }

    /* ── Text ── */
    .main {
      min-width: 0;
      max-width: 590px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .title {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.045em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .name { min-width: 0; overflow: hidden; text-overflow: ellipsis; }

    .check {
      flex: 0 0 21px;
      width: 21px; height: 21px;
      filter: drop-shadow(0 4px 8px rgba(34, 197, 94, 0.26));
      animation: check-pop 1.8s ease-in-out infinite;
    }

    .amount {
      margin-top: 8px;
      color: var(--accent);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.04em;
      text-shadow: 0 6px 18px rgba(251, 146, 60, 0.25);
    }

    .message {
      margin-top: 10px;
      max-width: 560px;
      color: var(--text-sub);
      font-size: 28px;
      font-weight: 650;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Mie Ayam ── */
    .mie-ayam {
      position: absolute;
      right: 0; bottom: -56px;
      width: 245px; height: 215px;
      z-index: 2;
      pointer-events: none;
      animation: ma-enter 850ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }
    .mie-ayam-inner {
      position: absolute;
      inset: 0;
      animation: ma-float 4s ease-in-out infinite;
      transform-origin: 60% 82%;
    }
    .mie-ayam-glow {
      position: absolute;
      right: 24px; bottom: 12px;
      width: 180px; height: 72px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.24), transparent 70%);
      filter: blur(10px);
      animation: glow-pulse 3.5s ease-in-out infinite;
    }
    .mie-ayam-img {
      position: absolute;
      right: 0; bottom: 0;
      width: 230px; height: auto;
      display: block;
      filter: drop-shadow(0 16px 18px rgba(15, 23, 42, 0.18)) saturate(1.04);
      animation: ma-breathe 4s ease-in-out infinite;
    }
    .mie-ayam-effects {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      overflow: visible;
    }

    .steam {
      fill: none;
      stroke: #7c2d12;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0;
      stroke-dasharray: 42;
      stroke-dashoffset: 42;
      animation: steam-rise 2.8s ease-in-out infinite;
    }
    .steam.two { animation-delay: 0.55s; }

    .heart {
      transform-origin: center;
      animation: heart-float 2.6s ease-in-out infinite;
      filter: drop-shadow(0 5px 8px rgba(239, 68, 68, 0.26));
    }

    .sparkle { transform-origin: center; animation: sparkle 1.8s ease-in-out infinite; }
    .sparkle.two   { animation-delay: 0.45s; }
    .sparkle.three { animation-delay: 0.85s; }
    .sparkle.four  { animation-delay: 1.15s; }

    /* ── Animations ── */
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(14px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes ma-enter {
      from { opacity: 0; transform: translate(34px, 28px) scale(0.82) rotate(4deg); }
      to   { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    @keyframes ma-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-7px) rotate(-1deg); }
    }
    @keyframes ma-breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.015); }
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scaleX(1); }
      50%       { opacity: 0.85; transform: scaleX(1.08); }
    }
    @keyframes avatar-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    @keyframes check-pop {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }
    @keyframes steam-rise {
      0%   { opacity: 0; stroke-dashoffset: 42; transform: translateY(12px); }
      35%  { opacity: 0.75; }
      100% { opacity: 0; stroke-dashoffset: 0; transform: translateY(-16px); }
    }
    @keyframes heart-float {
      0%, 100% { transform: translateY(0) rotate(-8deg) scale(1); }
      50%       { transform: translateY(-11px) rotate(7deg) scale(1.08); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.22; transform: scale(0.7) rotate(0deg); }
      50%       { opacity: 1; transform: scale(1.18) rotate(18deg); }
    }
  </style>
</head>
<body>
  <div class="alert">
    <div class="alert-content">
      <div class="avatar-frame">
        <img class="avatar" src="{{gifterPicture}}" alt=""
             onerror="this.closest('.avatar-frame').remove()" />
      </div>

      <main class="main">
        <div class="title">
          <span class="name">{{gifterName}}</span>
          <svg class="check" viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="10" cy="10" r="10" fill="#22c55e" />
            <path d="M5.2 10.3 8.4 13.4 14.8 7" fill="none" stroke="#fff"
                  stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="amount">{{formattedAmount}}</div>
        <div class="message">"{{message}}"</div>
      </main>
    </div>

    <div class="mie-ayam" aria-hidden="true">
      <div class="mie-ayam-inner">
        <div class="mie-ayam-glow"></div>
        <img class="mie-ayam-img" src="mie-ayam.png" alt="" />
        <svg class="mie-ayam-effects" viewBox="0 0 245 215" xmlns="http://www.w3.org/2000/svg">
          <g class="heart">
            <path d="M62 35 C50 26 39 37 46 50 C52 62 66 65 74 68 C82 57 92 47 84 36 C78 28 69 28 62 35Z"
                  fill="#ef4444" stroke="#4b1d16" stroke-width="4" stroke-linejoin="round" />
            <circle cx="77" cy="38" r="3" fill="#fecaca" />
            <circle cx="80" cy="44" r="2" fill="#fecaca" />
          </g>
          <path class="steam" d="M92 88 C79 76 99 69 88 55" />
          <path class="steam two" d="M112 84 C99 71 118 64 109 49" />
          <g class="sparkle">
            <path d="M35 158 L40 169 L51 174 L40 179 L35 190 L30 179 L19 174 L30 169 Z" fill="#fbbf24" />
          </g>
          <g class="sparkle two">
            <path d="M210 116 L214 125 L223 129 L214 133 L210 142 L206 133 L197 129 L206 125 Z" fill="#fbbf24" />
          </g>
          <g class="sparkle three">
            <circle cx="55" cy="120" r="3" fill="#f59e0b" />
            <circle cx="220" cy="92" r="3" fill="#f59e0b" />
          </g>
          <g class="sparkle four">
            <circle cx="198" cy="174" r="3" fill="#fbbf24" />
            <circle cx="28" cy="108" r="2.5" fill="#fbbf24" />
          </g>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
